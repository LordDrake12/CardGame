<!doctype html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>WebCards</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header>
    <h1>WebCards</h1>
    <div id="authBar"></div>
  </header>

  <main>
    <section id="authPanel" class="panel"></section>

    <section id="gamePanel" class="hidden">
      <div class="tabs">
        <button data-tab="collection">Collection</button>
        <button data-tab="packs">Packs</button>
        <button data-tab="missions">Missions</button>
        <button data-tab="pvp">PvP</button>
        <button data-tab="trades">Trades</button>
        <button data-tab="submit">Submit Card</button>
        <button data-tab="admin">Admin</button>
      </div>
      <div id="tabContent" class="panel"></div>
    </section>
  </main>

  <script src="/app.js"></script>
</body>
</html>
